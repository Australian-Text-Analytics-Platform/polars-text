[package]
name = "polars_text"
version = "0.3.0"
edition = "2021"

[lib]
name = "polars_text"
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0"
hf-hub = "0.5"
# Phase-5 dict download support: `dirs` resolves the per-OS cache dir
# cross-platform (Mac/Linux/Windows) and `tar` + the already-present
# `flate2` extract the prebuilt Lindera dict tarballs we host on HF.
dirs = "5"
flate2 = "1"
tar = "0.4"
# Lindera — word/morpheme-level segmentation for Chinese (Jieba), Japanese
# (IPADIC / UniDic), and Korean (ko-dic). Jieba is embedded through Lindera so
# `model="jieba"` does not need a separate backend. JA/KO dicts stay
# download-on-first-use via lindera_dict so the wheel avoids bundling those
# larger binaries. The `lindera-ipadic` / `lindera-ko-dic` / `lindera-unidic`
# features pull in per-dict loader code paths only.
lindera = { version = "3", default-features = false, features = [
    "mmap",
    "embed-jieba",
    "lindera-ipadic",
    "lindera-ko-dic",
    "lindera-unidic",
] }
once_cell = "1"
# Keep all polars crates on the exact source tree used by Python polars 1.40.0.
# Building this crate standalone in CI must not rely on an outer workspace patch,
# otherwise Cargo mixes crates.io polars 0.53.0 with git-tagged pyo3-polars and
# the resolver breaks on transitive dependencies like chrono.
polars = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0", default-features = false, features = [
    "fmt",
    "dtype-struct",
] }
pyo3 = "0.28"
pyo3-polars = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0", features = [
    "derive",
] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokenizers = "0.22.2"
