[package]
name = "polars_text"
version = "0.1.3"
edition = "2021"

[lib]
name = "polars_text"
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0"
candle-core = "0.10"
candle-nn = "0.10"
candle-transformers = "0.10"
hf-hub = "0.5"
linfa = "0.8"
linfa-clustering = "0.8"
ndarray = "0.16"
once_cell = "1"
polars = { version = "0.53.0", default-features = false, features = [
    "fmt",
    "dtype-struct",
] }
polars-plan = { version = "0.53.0", features = [
    "serde",
    "parquet",
    "ipc",
    "csv",
    "json",
] }
polars-utils = { version = "0.53.0", features = ["serde"] }
polars-buffer = { version = "0.53.0" }
pyo3 = "0.28"
pyo3-polars = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0", features = [
    "derive",
] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokenizers = "0.22.2"
