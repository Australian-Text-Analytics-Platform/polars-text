[package]
name = "polars_text"
version = "0.1.7"
edition = "2021"

[lib]
name = "polars_text"
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0"
candle-core = "0.10"
candle-nn = "0.10"
candle-transformers = "0.10"
hf-hub = "0.5"
jieba-rs = "0.9"
linfa = "0.8"
linfa-clustering = "0.8"
ndarray = "0.16"
once_cell = "1"
# Keep all polars crates on the exact source tree used by Python polars 1.40.0.
# Building this crate standalone in CI must not rely on an outer workspace patch,
# otherwise Cargo mixes crates.io polars 0.53.0 with git-tagged pyo3-polars and
# the resolver breaks on transitive dependencies like chrono.
polars = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0", default-features = false, features = [
    "fmt",
    "dtype-struct",
] }
#
# polars-plan feature set
# =======================
# Each Cargo feature in polars-plan gates a `#[cfg(feature = "...")]` arm in
# DslPlan / FunctionExpr / dtype enums. Python polars wheels are built with
# the kitchen-sink feature surface; we are compiled against the SAME upstream
# tag (py-1.40.0) but must enable matching features explicitly, otherwise
# `DslPlan::deserialize_versioned()` fails with `unknown variant '...'` for
# any plan that uses a feature we forgot to flip on.
#
# Maintenance rule: when the WebApp adds a polars op that isn't listed below,
# enable the matching feature here BEFORE shipping the op — workspace save and
# load both walk every `.plbin` through `polars_text::list_source_paths`, so
# a missing feature turns into an HTTP 500 the first time any user saves or
# loads a workspace containing that op.
#
# Features deliberately omitted (deny list, see bottom of this section).
#
polars-plan = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0", features = [
    # ---- Core: serde + scan/sink IO formats ---------------------------------
    "serde",
    "parquet",
    "ipc",
    "csv",
    "json",
    "scan_lines",       # streaming line-scan source variant
    "hive_partitions",  # hive-partitioned scan source variant (year=.../month=...)

    # ---- Compile flavor -----------------------------------------------------
    # `nightly` gates DslPlan variants like `StringFunction::Titlecase`.
    # Python wheels enable it unconditionally, so we must too.
    "nightly",
    # Internal annotations / debug variants. Cheap to enable, future-proof.
    "chunked_ids",
    "cse",
    "debugging",
    "dot_diagram",
    "future",

    # ---- Expression namespaces ---------------------------------------------
    # Each gates its own serde variant in DslPlan. Without these, deserialize
    # fails with e.g. `unknown variant 'StringExpr'/'TemporalExpr'/...`.
    "strings",
    "temporal",
    "regex",
    "binary_encoding",
    "string_encoding",
    "concat_str",
    "string_pad",
    "string_normalize",
    "string_reverse",
    "string_to_integer",
    "extract_groups",
    "extract_jsonpath",  # gates `.str.json_decode()` / `.str.json_path_match()`
    "list_count",
    "list_drop_nulls",
    "list_filter",
    "list_gather",
    "list_sample",
    "list_sets",
    "list_to_struct",
    "array_count",
    "array_to_struct",

    # ---- Random / sampling --------------------------------------------------
    # `random` gates `FunctionExpr::Random` emitted by `.sample()`,
    # `.shuffle()`, and `pl.int_range(pl.len()).sample(seed=...)`.
    "random",

    # ---- FFI plugins --------------------------------------------------------
    # `ffi_plugin` gates the `FunctionExpr::FfiPlugin` DslPlan variant. Every
    # Python call to `polars.plugins.register_plugin_function` emits this
    # variant in the lazy plan — including this very crate's
    # `polars_text.tokenize_with_offsets`. Without the feature, walking a
    # persisted plan that contains a tokenise expression (e.g. on workspace
    # save/load) fails with `unknown variant 'FfiPlugin'`. We never actually
    # load plugins at runtime from `list_source_paths`, but the deserializer
    # still needs the enum variant to exist.
    "ffi_plugin",

    # ---- Predicates & comparisons ------------------------------------------
    "is_in",
    "is_between",
    "is_close",          # `pl.col(x).is_close(...)` — float tolerance compare
    "is_first_distinct",
    "is_last_distinct",
    "is_unique",
    "arg_where",         # `pl.arg_where(condition)` — index lookup

    # ---- Numeric / math -----------------------------------------------------
    "round_series",
    "abs",
    "log",
    "trigonometry",
    "sign",
    "true_div",
    "bitwise",           # bit_and/bit_or/bit_xor/count_ones/leading_zeros/...

    # ---- Windowing / rolling / sequence-over-time --------------------------
    "rolling_window",
    "rolling_window_by",
    "rank",
    "diff",
    "pct_change",
    "moment",
    "ewma",
    "ewma_by",
    "interpolate",
    "interpolate_by",
    "cum_agg",
    "mode",
    "approx_unique",
    "unique_counts",
    "top_k",
    "search_sorted",
    "merge_sorted",
    "replace",
    "find_many",
    "repeat_by",

    # ---- Joins --------------------------------------------------------------
    "asof_join",
    "iejoin",
    "cross_join",
    "semi_anti_join",

    # ---- Domain-specific ops ------------------------------------------------
    "business",
    "range",             # `pl.int_range`, `pl.date_range`
    "coalesce",
    "fused",
    "rle",
    "cutqcut",
    "row_hash",
    "reinterpret",
    "propagate_nans",
    "hist",
    "cov",
    "peaks",
    "index_of",
    "month_start",
    "month_end",
    "offset_by",
    "timezones",
    "dynamic_group_by",
    "pivot",
    "meta",
    "fmt",
    "object",            # generic Python-object dtype passthrough

    # ---- Datatypes referenced by serialized plans from Python polars -------
    # Each gates the corresponding `DataType::*` serde variant.
    "dtype-categorical",
    "dtype-datetime",
    "dtype-date",
    "dtype-time",
    "dtype-duration",
    "dtype-decimal",
    "dtype-array",
    "dtype-struct",
    "dtype-extension",   # Arrow extension-typed columns (custom annotations etc.)
    "dtype-i8",
    "dtype-i16",
    "dtype-i128",
    "dtype-u8",
    "dtype-u16",
    "dtype-u128",
    "dtype-f16",

    # -------------------------------------------------------------------------
    # Deliberately NOT enabled — do not add without understanding the cost:
    #
    #   bigidx                    ABI break: switches IDX from u32 to u64
    #                             across the whole stack. Python polars wheels
    #                             are u32; mixing silently corrupts FFI.
    #   cloud                     Pulls AWS/Azure/GCS SDKs (~30 MB binary
    #                             growth, runtime auth concerns). We never
    #                             scan remote URIs in plan introspection.
    #   python                    Registers a SECOND set of pyo3 bindings
    #                             inside polars-plan; collides with our
    #                             top-level pyo3-polars binding.
    #   dsl-schema                Pulls `schemars` + `sha2` (~5 MB); JSON
    #                             schema export for IDE tooling, not runtime.
    #   ir_serde                  Internal optimizer IR serde (different
    #                             format than DslPlan); not what we read.
    #   polars_cloud_client/_server  Cloud orchestration; out of scope.
    #   allow_unused              Just silences unused-import warnings.
    # -------------------------------------------------------------------------
] }
polars-utils = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0", features = [
    "serde",
] }
polars-buffer = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0" }
pyo3 = "0.28"
pyo3-polars = { git = "https://github.com/pola-rs/polars.git", tag = "py-1.40.0", features = [
    "derive",
] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokenizers = "0.22.2"
