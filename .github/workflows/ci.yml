name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: polars-text-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            python-architecture: x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.python-architecture || 'x64' }}

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache Hugging Face downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          target: ${{ matrix.target }}
          container: off
          rust-toolchain: stable
          sccache: true
          args: --release --locked --out dist --interpreter 3.14 --timings

      - name: Upload Cargo timing report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-timings-${{ matrix.name }}
          path: target/cargo-timings/cargo-timing.html
          if-no-files-found: ignore

      - name: Install test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip pytest
          # Install the freshly-built wheel by file path so pip cannot
          # silently substitute a published PyPI version (avoids the
          # ModuleNotFoundError class of failures where the local build
          # added a pure-Python module the index version doesn't have).
          # Transitive deps (polars==1.40.0) still resolve from PyPI.
          python -m pip install --force-reinstall dist/polars_text-*.whl

      - name: Run pytest
        shell: bash
        run: pytest -q

      - name: Show sccache stats
        if: always()
        continue-on-error: true
        shell: bash
        run: sccache --show-stats
