name: Package And Release

"on":
    pull_request:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            publish_target:
                description: Optional package index for a manual publish of the selected ref
                type: choice
                required: true
                default: none
                options:
                    - none
                    - testpypi

concurrency:
    group: polars-text-release-${{ github.ref }}
    cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
    contents: read

jobs:
    build_wheels:
        name: Build ${{ matrix.name }} Wheel
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-x86_64
                      os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      manylinux: "2_28"
                      before-script-linux: dnf install -y openssl-devel && dnf clean all
                    - name: macos-arm64
                      os: macos-14
                      target: aarch64-apple-darwin
                    - name: windows-x86_64
                      os: windows-latest
                      target: x86_64-pc-windows-msvc
                      python-architecture: x64
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  architecture: ${{ matrix.python-architecture || 'x64' }}

            - name: Build wheel
              uses: PyO3/maturin-action@v1
              with:
                  target: ${{ matrix.target }}
                  manylinux: ${{ matrix.manylinux || '' }}
                  before-script-linux: ${{ matrix.before-script-linux || '' }}
                  args: --release --out dist --interpreter 3.14 --compatibility pypi

            - name: Verify wheel metadata
              shell: bash
              run: |
                  python -m pip install --upgrade twine
                  twine check --strict dist/*

            - name: Upload wheels
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.name }}
                  path: dist/*
                  if-no-files-found: error

    build_sdist:
        name: Build Source Distribution
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Build source distribution
              uses: PyO3/maturin-action@v1
              with:
                  command: sdist
                  args: --out dist

            - name: Verify source distribution metadata
              shell: bash
              run: |
                  python -m pip install --upgrade twine
                  twine check --strict dist/*

            - name: Upload source distribution
              uses: actions/upload-artifact@v4
              with:
                  name: dist-sdist
                  path: dist/*
                  if-no-files-found: error

    publish_testpypi:
        name: Publish To TestPyPI
        needs:
            - build_wheels
            - build_sdist
        if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Download built distributions
              uses: actions/download-artifact@v4
              with:
                  pattern: dist-*
                  path: dist
                  merge-multiple: true

            - name: Publish package distributions to TestPyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/
                  packages-dir: dist
                  skip-existing: true

    publish_pypi:
        name: Publish To PyPI
        needs:
            - build_wheels
            - build_sdist
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Download built distributions
              uses: actions/download-artifact@v4
              with:
                  pattern: dist-*
                  path: dist
                  merge-multiple: true

            - name: Publish package distributions to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist
